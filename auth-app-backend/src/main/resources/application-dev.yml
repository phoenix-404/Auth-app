#Development version of Configuration
server:
  port: 8083

#database connections
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: root

#JPA and Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

  logging:
    level:
      org.springframework.security: DEBUG

security:
    jwt:
      secret: ${JWT_SECRET:a_very_long_random_string_with_at_least_64_characters_for_security_reasons_123}
      issuer: ${JWT_ISSUER:api.substring.com}
      access-ttl-seconds: ${JWT_ACCESS_TTL_SECONDS:3600} #1 Hour
      refresh-ttl-seconds: ${JWT_REFRESH_TTL_SECONDS:86400} #24 hours
      refresh-token-cookie-name: ${JWT_REFRESH_COOKIE_NAME:refreshToken}
      cookie-secure: ${JWT_COOKIE_SECURE:true}
      cookie-http-only: ${JWT_COOKIE_HTTP_ONLY:true}
      cookie-same-site: ${JWT_COOKIE_SAME_SITE:lax}