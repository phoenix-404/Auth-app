#Development version of Configuration
server:
  port: 8083

#database connections
spring:
  datasource:
    url: jdbc:mysql://localhost:3306/auth_app
    username: root
    password: root

#JPA and Hibernate Configuration
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true
    show-sql: true

